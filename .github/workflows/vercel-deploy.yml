name: Manual Vercel Deployment

on:
  push:
    branches:
      - Development
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to (preview or production)'
        required: true
        default: 'preview'
        type: choice
        options:
          - preview
          - production
      description:
        description: 'Optional notes/reason for this manual deployment'
        required: false
        type: string

jobs:
  test:
    name: Run Unit Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./spelling-scholar-fe
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          path: spelling-scholar-fe

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: spelling-scholar-fe/package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Run Unit Tests
        run: npm test

  deploy:
    name: Deploy to Vercel
    needs: test
    runs-on: ubuntu-latest
    env:
      DEPLOY_ENV: ${{ github.event.inputs.environment || ((github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') && 'production' || 'preview') }}
    defaults:
      run:
        working-directory: ./spelling-scholar-fe
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          path: spelling-scholar-fe

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel Environment Information
        run: vercel pull --yes --environment=${{ env.DEPLOY_ENV }} --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Build Project Artifacts
        run: vercel build ${{ env.DEPLOY_ENV == 'production' && '--prod' || '' }} --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}

      - name: Deploy Project Artifacts to Vercel
        id: deploy
        run: |
          # Deploy and capture the deployment URL
          DEPLOY_URL=$(vercel deploy --prebuilt ${{ env.DEPLOY_ENV == 'production' && '--prod' || '' }} --token=${{ secrets.VERCEL_TOKEN }})
          echo "DEPLOY_URL=$DEPLOY_URL" >> $GITHUB_ENV
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Create Deployment Summary
        run: |
          echo "### 🚀 Vercel Deployment Successful!" >> $GITHUB_STEP_SUMMARY
          echo "- **Environment:** \`${{ env.DEPLOY_ENV }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Triggered By:** @${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Deployment URL:** [${{ env.DEPLOY_URL }}](${{ env.DEPLOY_URL }})" >> $GITHUB_STEP_SUMMARY
          if [ -n "${{ github.event.inputs.description }}" ]; then
            echo "- **Description/Notes:** ${{ github.event.inputs.description }}" >> $GITHUB_STEP_SUMMARY
          fi
