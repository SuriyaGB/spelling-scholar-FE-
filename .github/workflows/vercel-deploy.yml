name: Manual Vercel Deployment

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to (preview or production)'
        required: true
        default: 'preview'
        type: choice
        options:
          - preview
          - production
      description:
        description: 'Optional notes/reason for this manual deployment'
        required: false
        type: string

jobs:
  deploy:
    name: Deploy to Vercel
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./spelling-scholar-fe
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          path: spelling-scholar-fe

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel Environment Information
        run: vercel pull --yes --environment=${{ github.event.inputs.environment }} --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Build Project Artifacts
        run: vercel build ${{ github.event.inputs.environment == 'production' && '--prod' || '' }} --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Deploy Project Artifacts to Vercel
        id: deploy
        run: |
          # Deploy and capture the deployment URL
          DEPLOY_URL=$(vercel deploy --prebuilt ${{ github.event.inputs.environment == 'production' && '--prod' || '' }} --token=${{ secrets.VERCEL_TOKEN }})
          echo "DEPLOY_URL=$DEPLOY_URL" >> $GITHUB_ENV
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Create Deployment Summary
        run: |
          echo "### 🚀 Vercel Deployment Successful!" >> $GITHUB_STEP_SUMMARY
          echo "- **Environment:** \`${{ github.event.inputs.environment }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Triggered By:** @${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Deployment URL:** [${{ env.DEPLOY_URL }}](${{ env.DEPLOY_URL }})" >> $GITHUB_STEP_SUMMARY
          if [ -n "${{ github.event.inputs.description }}" ]; then
            echo "- **Description/Notes:** ${{ github.event.inputs.description }}" >> $GITHUB_STEP_SUMMARY
          fi
